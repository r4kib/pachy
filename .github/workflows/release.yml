name: Release Pachy

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, xml, openssl, zlib, phar
          coverage: none
          ini-values: phar.readonly=0, opcache.enable_cli=1, opcache.jit=tracing, opcache.jit_buffer_size=128M

      - name: Install Dependencies
        run: composer install --no-interaction --optimize-autoloader --classmap-authoritative

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
